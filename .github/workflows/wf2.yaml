name: practice 2
on: 
  pull_request:
    branches:
      - assignment-1-dockerfile

jobs:
  build_and_test:
    name: Build and Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
        
      # - name: Run unit tests
      #   run: npm test

